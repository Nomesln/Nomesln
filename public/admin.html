<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HandyPro</title>
    <!-- Подключаем стили основного сайта, чтобы шрифты и цвета совпадали -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* =========================================
           ЭКСКЛЮЗИВНЫЕ СТИЛИ ДЛЯ АДМИНКИ
           ========================================= */
        body {
            /* Используем цвета из вашего style.css, но если их там нет - даем запасной темный цвет */
            background: var(--bg-dark, #0f172a); 
            color: #fff;
            padding-bottom: 3rem;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 5%;
        }

        /* Шапка админки */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
        }

        .admin-header h1 span {
            color: var(--accent-orange, #ff6b00);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Сетка карточек */
        .booking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        /* Дизайн отдельной заявки */
        .booking-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative;
            overflow: hidden;
            border-left: 4px solid var(--accent-orange, #ff6b00);
        }

        .booking-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Если это Emergency - красная полоса */
        .booking-card.emergency-card {
            border-left-color: #ef4444;
            background: linear-gradient(to right, rgba(239, 68, 68, 0.05), rgba(255, 255, 255, 0.03));
        }

        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.2rem;
        }

        .booking-service {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .emergency-tag {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: inline-block;
            width: fit-content;
        }

        .booking-time {
            font-size: 0.8rem;
            color: var(--text-muted, #94a3b8);
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .booking-client {
            font-size: 1.05rem;
            color: #f1f5f9;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .booking-client i {
            color: var(--text-muted, #94a3b8);
            margin-right: 6px;
            font-size: 0.9rem;
        }

        .booking-details {
            color: var(--text-muted, #94a3b8);
            font-size: 0.85rem;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .booking-message {
            color: #cbd5e1;
            font-size: 0.9rem;
            padding-top: 1rem;
            border-top: 1px dashed rgba(255,255,255,0.1);
            font-style: italic;
            line-height: 1.4;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted, #94a3b8);
            grid-column: 1 / -1;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <!-- Шапка -->
        <div class="admin-header">
            <h1>HandyPro <span>Control Panel</span></h1>
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>

        <!-- Сюда будут падать карточки с заявками -->
        <div id="booking-list" class="booking-grid">
            <!-- Загрузка -->
            <div class="empty-state">
                <i class="fas fa-circle-notch fa-spin"></i>
                <p>Loading requests...</p>
            </div>
        </div>
    </div>

    <!-- Скрипт связи с сервером -->
    <script>
        async function fetchBookings() {
            try {
                const response = await fetch('/api/bookings');
                const bookings = await response.json();
                
                const listContainer = document.getElementById('booking-list');
                listContainer.innerHTML = ''; 

                if(bookings.length === 0) {
                    listContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>No booking requests yet. They will appear here automatically.</p>
                        </div>
                    `;
                    return;
                }

                // Отображаем от новых к старым
                bookings.reverse().forEach(booking => {
                    const dateObj = new Date(booking.createdAt || booking.date || Date.now());
                    const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    
                    const isEmergency = booking.emergency ? true : false;
                    const cardClass = isEmergency ? 'booking-card emergency-card' : 'booking-card';
                    const emergencyTag = isEmergency ? '<span class="emergency-tag"><i class="fas fa-exclamation-triangle"></i> Emergency</span>' : '';
                    const serviceName = booking.service || 'General Request';
                    
                    // Забираем адрес клиента
                    const clientAddress = booking.address || 'Address not provided';
                    const messageText = booking.message ? booking.message : '';

                    const card = `
                        <div class="${cardClass}">
                            <div class="booking-header">
                                <div class="booking-service">
                                    ${serviceName}
                                    ${emergencyTag}
                                </div>
                                <div class="booking-time">${formattedDate}</div>
                            </div>
                            
                            <div class="booking-client">
                                <div><i class="fas fa-user"></i> ${booking.name}</div>
                                <div style="margin-top: 5px;"><i class="fas fa-phone-alt"></i> ${booking.phone}</div>
                            </div>
                            
                            <div class="booking-details">
                                <span><i class="fas fa-envelope"></i> ${booking.email}</span>
                                <!-- Выводим полный адрес вместо ZIP -->
                                <span><i class="fas fa-map-marker-alt"></i> ${clientAddress}</span>
                            </div>
                            
                            ${messageText ? `<div class="booking-message"><i class="fas fa-quote-left" style="opacity: 0.5; margin-right: 5px;"></i> ${messageText}</div>` : ''}
                        </div>
                    `;
                    listContainer.innerHTML += card;
                });

            } catch (error) {
                console.error("Ошибка загрузки заявок:", error);
            }
        }

        // Запускаем
        fetchBookings();
        
        // Обновляем каждые 5 секунд без перезагрузки страницы
        setInterval(fetchBookings, 5000);
    </script>
    <script src="server.js"></script>
</body>
</html>
